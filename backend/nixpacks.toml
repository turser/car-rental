[phases.setup]
nixPkgs = ["php80", "php80Extensions.pdo", "php80Extensions.pdo_mysql", "php80Extensions.mbstring", "php80Extensions.tokenizer", "php80Extensions.xml", "php80Extensions.bcmath"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"